<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suite Crea y Prospera - Airbnb Design Edition</title>
    
    <!-- Tailwind CSS para el motor de estilos adaptativo -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts para una tipografía que emule Airbnb Cereal VF -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Configuración del motor de diseño de Airbnb -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        airbnb: {
                            rausch: '#ff385c',
                            active: '#e00b41',
                            disabled: '#ffd1da',
                            error: '#c13515',
                            luxe: '#460479',
                            plus: '#92174d',
                            ink: '#222222',
                            body: '#3f3f3f',
                            muted: '#6a6a6a',
                            'muted-soft': '#929292',
                            hairline: '#dddddd',
                            'hairline-soft': '#ebebeb',
                            'border-strong': '#c1c1c1',
                            canvas: '#ffffff',
                            'surface-soft': '#f7f7f7',
                            'surface-card': '#ffffff',
                            'surface-strong': '#f2f2f2'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }

            }
        }
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
    </style>

    <!-- React 18, React-DOM y el compilador de Babel Standalone para interpretar JSX de forma nativa en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-airbnb-canvas text-airbnb-ink font-sans antialiased selection:bg-airbnb-disabled">

    <!-- Contenedor raiz para renderizar React -->
    <div id="root"></div>

    <!-- El script tipo "text/babel" asegura que Babel lo compile en tiempo de ejecución de manera perfecta -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        
        // Íconos SVG personalizados de alta calidad para evitar fallos de dependencias
        const Sparkles = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
                <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5z"/>
                <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z"/>
            </svg>
        );

        const Calculator = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <rect x="4" y="2" width="16" height="20" rx="2" />
                <line x1="8" y1="6" x2="16" y2="6" />
                <line x1="16" y1="14" x2="16" y2="18" />
                <path d="M16 10h.01M12 10h.01M8 10h.01M12 14h.01M8 14h.01M12 18h.01M8 18h.01" />

        );

        const Beaker = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">

            </svg>
        );

        const Trash2 = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6" />

        const Check = ({ className }) => (

        const Info = ({ className }) => (

                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
        );

        const User = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
        );

        const Star = ({ className, fill }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill={fill || "none"} viewBox="0 0 24 24">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
            </svg>
        );

        const Edit3 = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
            </svg>
        );

        const Lightbulb = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .5 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5" />
                <path d="M9 18h6M10 22h4" />
            </svg>
        );

        const Package = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                <polygon points="12 22.08 12 12 3 6.92 3 17.08 12 22.08" />
                <polygon points="12 22.08 21 17.08 21 6.92 12 12 12 22.08" />
                <polygon points="12 12 21 6.92 12 1.84 3 6.92 12 12" />
            </svg>
        );

        const Copy = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
            </svg>
        );

        const ChevronRight = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <polyline points="9 18 15 12 9 6" />
            </svg>
        );

        const Plus = ({ className }) => (
            <svg className={className} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none" viewBox="0 0 24 24">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
        );

        function App() {
            // Estado para el nombre de la creadora (Guardado persistente)
            const [creatorName, setCreatorName] = useState(() => {
                const local = localStorage.getItem('cp_creator_name');
                return local || '';
            });
            const [isEditingName, setIsEditingName] = useState(() => {
                const local = localStorage.getItem('cp_creator_name');
                return !local;
            });
            const [tempName, setTempName] = useState(creatorName);

            // Pestana de navegacion activa
            const [activeTab, setActiveTab] = useState('calculator');
            
            // Lotes guardados y Colecciones guardadas de forma persistente
            const [savedProducts, setSavedProducts] = useState(() => {
                const local = localStorage.getItem('cp_saved_products_cop');
                return local ? JSON.parse(local) : [];
            });
            const [savedCollections, setSavedCollections] = useState(() => {
                const local = localStorage.getItem('cp_saved_collections_cop');
                return local ? JSON.parse(local) : [];
            });

            useEffect(() => {
                localStorage.setItem('cp_saved_products_cop', JSON.stringify(savedProducts));
            }, [savedProducts]);

            useEffect(() => {
                localStorage.setItem('cp_saved_collections_cop', JSON.stringify(savedCollections));
            }, [savedCollections]);

            const formatCOP = (value) => {
                const num = parseFloat(value) || 0;
                return new Intl.NumberFormat('es-CO', {
                    style: 'currency',
                    currency: 'COP',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0
                }).format(num);
            };

            // Estados de la Calculadora de Costos
            const [calcCategory, setCalcCategory] = useState('velas'); 
            const [prodName, setProdName] = useState('');
            
            // Valores por defecto orientados al mercado colombiano
            const [mainQty, setMainQty] = useState(150); // gramos
            const [mainCostPkg, setMainCostPkg] = useState(45000); // costo empaque de 1kg
            const [mainSizePkg, setMainSizePkg] = useState(1000); // tamaño empaque
            
            const [fragranceQty, setFragranceQty] = useState(10); // gramos
            const [fragranceCostPkg, setFragranceCostPkg] = useState(30000); // costo esencia de 100g
            const [fragranceSizePkg, setFragranceSizePkg] = useState(100);

            const [containerCost, setContainerCost] = useState(4500); // costo envase o decorado unitario
            const [laborHours, setLaborHours] = useState(0.5); 
            const [hourlyRate, setHourlyRate] = useState(10000); // tarifa por hora de trabajo
            const [profitMargin, setProfitMargin] = useState(60); // margen deseado

            // Los 3 nuevos factores de costos ocultos solicitados (COP)
            const [utilitiesCost, setUtilitiesCost] = useState(1500); // Servicios publicos (gas, agua, luz)
            const [toolDepreciation, setToolDepreciation] = useState(800); // Desgaste de moldes y herramientas
            const [shippingPkgCost, setShippingPkgCost] = useState(3500); // Empaque secundario y envios por pieza

            // Estados del Simulador de Alquimia
            const [simCategory, setSimCategory] = useState('velas');
            const [mouldCapacity, setMouldCapacity] = useState(200); 
            const [fragrancePercent, setFragrancePercent] = useState(8); 
            const [resinaRatio, setResinaRatio] = useState('1:1'); 
            const [alchemySteps, setAlchemySteps] = useState({
                step1: false, step2: false, step3: false
            });

            // Estados del Disenador Creativo
            const [selectedVibe, setSelectedVibe] = useState('relax');
            const [copiedText, setCopiedText] = useState(false);

            const calculations = useMemo(() => {
                const mainCost = (mainQty * (mainCostPkg / mainSizePkg)) || 0;
                const fragCost = (fragranceQty * (fragranceCostPkg / fragranceSizePkg)) || 0;
                const packaging = parseFloat(containerCost) || 0;
                
                // Sumatoria de insumos directos y los 3 costos adicionales (COP)
                const addOnsCost = parseFloat(utilitiesCost) + parseFloat(toolDepreciation) + parseFloat(shippingPkgCost);
                const rawMaterialsCost = mainCost + fragCost + packaging + addOnsCost;
                
                // Calculo de mano de obra
                const laborCost = (parseFloat(laborHours) * parseFloat(hourlyRate)) || 0;
                
                // Costo total unitario de produccion
                const totalCost = rawMaterialsCost + laborCost;
                
                // Precio sugerido (Precio = Costo / (1 - Margen/100))
                const factor = (100 - profitMargin) / 100;
                const suggestedPrice = factor > 0 ? (totalCost / factor) : totalCost * 2;
                const netProfit = suggestedPrice - totalCost;

                const retailPriceX3 = totalCost * 3;
                const wholesalePriceX2 = totalCost * 2;

                return {
                    mainCost,
                    fragCost,
                    materialsOnly: rawMaterialsCost - addOnsCost,
                    addOnsCost,
                    laborCost,
                    totalCost,
                    suggestedPrice,
                    netProfit,
                    retailPriceX3,
                    wholesalePriceX2
                };
            }, [mainQty, mainCostPkg, mainSizePkg, fragranceQty, fragranceCostPkg, fragranceSizePkg, containerCost, laborHours, hourlyRate, profitMargin, utilitiesCost, toolDepreciation, shippingPkgCost]);

            const handleSaveCreatorName = (e) => {
                e.preventDefault();
                if (tempName.trim()) {
                    setCreatorName(tempName);
                    localStorage.setItem('cp_creator_name', tempName);
                    setIsEditingName(false);
                }
            };

            const handleSaveProduct = (e) => {
                e.preventDefault();
                if (!prodName.trim()) return;
                const newProduct = {
                    id: Date.now(),
                    name: prodName,
                    category: calcCategory,
                    cost: calculations.totalCost,
                    price: calculations.suggestedPrice,
                    profit: calculations.netProfit,
                    margin: profitMargin
                };
                setSavedProducts([newProduct, ...savedProducts]);
                setProdName('');
            };

            const handleDeleteProduct = (id) => {
                setSavedProducts(savedProducts.filter(p => p.id !== id));
            };

            const formulaResult = useMemo(() => {
                const capacity = parseFloat(mouldCapacity) || 0;
                const fragP = parseFloat(fragrancePercent) || 0;

                if (simCategory === 'velas') {
                    const ceraNeeded = capacity / (1 + (fragP / 100));
                    const fragNeeded = capacity - ceraNeeded;
                    return {
                        baseName: 'Cera de Soya/Parafina',
                        baseQty: ceraNeeded.toFixed(1),
                        fragName: 'Fragancia / Esencia',
                        fragQty: fragNeeded.toFixed(1),
                        unit: 'g'
                    };
                } else if (simCategory === 'jabones') {
                    const fragQty = (capacity * (fragP / 100));
                    const baseQty = capacity - fragQty;
                    return {
                        baseName: 'Base de Glicerina',
                        baseQty: baseQty.toFixed(1),
                        fragName: 'Esencias y Aditivos',
                        fragQty: fragQty.toFixed(1),
                        unit: 'g'
                    };
                } else {
                    if (resinaRatio === '1:1') {
                        return {
                            baseName: 'Componente A (Resina)',
                            baseQty: (capacity / 2).toFixed(1),
                            fragName: 'Componente B (Catalizador)',
                            fragQty: (capacity / 2).toFixed(1),
                            unit: 'ml/g'
                        };
                    } else {
                        const part = capacity / 3;
                        return {
                            baseName: 'Componente A (Resina)',
                            baseQty: (part * 2).toFixed(1),
                            fragName: 'Componente B (Catalizador)',
                            fragQty: part.toFixed(1),
                            unit: 'ml/g'
                        };
                    }
                }
            }, [simCategory, mouldCapacity, fragrancePercent, resinaRatio]);

            useEffect(() => {
                setAlchemySteps({ step1: false, step2: false, step3: false });
            }, [simCategory]);

            // Datos de vibras estéticas de colecciones para el Diseñador Creativo
            const vibesData = {
                relax: {
                    title: 'Relajacion Profunda (Estilo Zen/Spa)',
                    description: 'Pensado para velas de soya relajantes y jabones terapeuticos de noche. Evoca paz, balance y bienestar absoluto.',
                    colors: [
                        { name: 'Lavanda Suave', hex: '#E9D5FF', desc: 'Sutil equilibrio' },
                        { name: 'Verde Eucalipto', hex: '#A7F3D0', desc: 'Claridad mental' },
                        { name: 'Blanco Lino', hex: '#F8FAFC', desc: 'Pureza y frescura' }
                    ],
                    scents: '60% Lavanda, 30% Manzanilla Dulce, 10% Sandalo.',
                    decor: 'Capullos de lavanda deshidratada y mini cuarzos amatista colocados con delicadeza.',
                    names: ['Brisa del Olivo', 'Serafina Zen', 'Refugio de Paz'],
                    hook: 'Regalate un momento de pausa consciente. Una mezcla terapeutica disenada para calmar el ritmo del dia y ambientar tus espacios con elegancia natural.'
                },
                mystic: {
                    title: 'Energia Magica (Mistica & Cristales)',
                    description: 'Disenos de alta vibracion y piezas de resina con cuarzos naturales incrustados.',
                    colors: [
                        { name: 'Purpura Esoterico', hex: '#D8B4FE', desc: 'Espiritualidad' },
                        { name: 'Azul Galaxia', hex: '#93C5FD', desc: 'Intuicion cosmica' },
                        { name: 'Hojuela de Oro', hex: '#FDE047', desc: 'Abundancia y brillo' }
                    ],
                    scents: '50% Madera de Sandalo, 30% Palo Santo, 20% Incienso.',
                    decor: 'Polvo de mica brillante, hojuelas metalicas doradas y pequenos cristales de cuarzo rosa o amatistas.',
                    names: ['Despertar Mistico', 'Alquimia Floral', 'Aura Celestial'],
                    hook: 'Piezas artesanales cargadas de intencion. Disenadas para armonizar tu hogar y elevar la energia de tu altar personal.'
                },
                luxury: {
                    title: 'Lujo Minimalista (Coleccion Boutique)',
                    description: 'Estetica de hotel de diseno, sobria, elegante y contemporanea.',
                    colors: [
                        { name: 'Negro Azabache', hex: '#1E293B', desc: 'Modernidad' },
                        { name: 'Champagne Satinado', hex: '#FEF08A', desc: 'Luz y calidez' },
                        { name: 'Gris Mineral', hex: '#E2E8F0', desc: 'Estilo arquitectonico' }
                    ],
                    scents: '40% Tabaco Dulce, 40% Vainilla de Bourbon, 20% Cedro.',
                    decor: 'Arenas minerales finas, pabilo de madera de cerezo que emite un sutil crujido natural.',
                    names: ['No. 12 Oud & Vainilla', 'Bruma de Bosque', 'Esencia del Valle'],
                    hook: 'Sofisticacion sin pretensiones. Aromas profundos inspirados en la perfumeria internacional y un diseno sobrio que se convierte en una obra de arte para tu espacio.'
                },
                tropical: {
                    title: 'Frescura Tropical (Citrica & Alegre)',
                    description: 'Jabones energizantes matutinos y velas vibrantes de verano.',
                    colors: [
                        { name: 'Naranja Mandarina', hex: '#FED7AA', desc: 'Alegria pura' },
                        { name: 'Amarillo Verbena', hex: '#FEF08A', desc: 'Energia solar' },
                        { name: 'Rosa Hibisco', hex: '#FBCFE8', desc: 'Toque jugoso' }
                    ],
                    scents: '50% Verbena de Limon, 30% Pulpa de Coco, 20% Mango Silvestre.',
                    decor: 'Rodajas de naranja deshidratada, semillas de amapola para exfoliacion suave.',
                    names: ['Amanecer Citrico', 'Sol de San Andres', 'Mango & Verbena'],
                    hook: 'Una explosion de vitalidad y frescura natural. Despierta tus mananas con la fuerza citrica del caribe para cuidar tu piel y llenarte de energia.'
                }
            };

            const currentVibe = vibesData[selectedVibe];

            const copyToClipboard = (text) => {
                // Alternativa de compatibilidad de copiado en iframe
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                
                setCopiedText(true);
                setTimeout(() => setCopiedText(false), 2000);
            };

            const handleSaveCollection = () => {
                const newCol = {
                    id: Date.now(),
                    vibeName: currentVibe.title,
                    colors: currentVibe.colors.map(c => c.name).join(', '),
                    scents: currentVibe.scents,
                    names: currentVibe.names[0]
                };
                setSavedCollections([newCol, ...savedCollections]);
            };

            const handleDeleteCollection = (id) => {
                setSavedCollections(savedCollections.filter(c => c.id !== id));
            };

            return (
                <div className="min-h-screen bg-airbnb-canvas text-airbnb-ink font-sans flex flex-col">
                    
                    {}
                    {/* CABEZAL SUPERIOR ESTILO AIRBNB */}
                    <header className="bg-airbnb-canvas border-b border-airbnb-hairline-soft py-6 px-6 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            
                            {/* Identidad de la marca */}
                            <div className="flex items-center gap-3">
                                <div className="bg-airbnb-rausch text-white p-2.5 rounded-full shadow-sm hover:scale-105 transition-all duration-300">
                                    <Sparkles className="w-5 h-5" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-bold text-airbnb-rausch tracking-tight">Crea y Prospera</h1>
                                    <p className="text-[11px] text-airbnb-muted font-semibold uppercase tracking-widest">Megapack de Aprendizaje Exitoso</p>
                                </div>
                            </div>

                            {/* Enlace al Tutorial en Google Drive */}
                            <div className="flex items-center gap-4">
                                <a 
                                    href="https://drive.google.com/drive/folders/1rJ5X3g7y5ZC3VcZT0d7gB339233_u2kG?usp=drive_link"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="flex items-center gap-1.5 px-4 py-2 border-2 border-airbnb-rausch text-airbnb-rausch hover:bg-airbnb-disabled/20 text-xs font-bold rounded-full transition-all duration-300 shadow-sm"
                                >
                                    <Package className="w-3.5 h-3.5 text-airbnb-rausch" />
                                    Tutorial MEGAPACK
                                </a>
                                <div className="text-right hidden sm:block">
                                    <span className="text-xs text-airbnb-muted block">Guia de Soporte Premium</span>
                                    <span className="text-sm font-semibold text-airbnb-ink flex items-center gap-1">
                                        <Star className="w-3.5 h-3.5 text-airbnb-rausch fill-airbnb-rausch" />
                                        5.0 · Alquimia Artesanal
                                    </span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* CONTENIDO DE LA SUITE */}
                    <main className="max-w-6xl w-full mx-auto px-6 py-10 flex-grow space-y-10">
                        
                        {}
                        {/* BANNER DE PERSONALIZACION DE LA CREADORA */}
                        <div className="mb-10">
                            {isEditingName ? (
                                <div className="border border-airbnb-hairline bg-airbnb-surface-soft rounded-xl p-6 shadow-sm max-w-2xl mx-auto animate-fade-in">
                                    <div className="flex items-center gap-3 mb-4">
                                        <div className="bg-airbnb-rausch text-white p-2.5 rounded-full">
                                            <User className="w-5 h-5" />
                                        </div>
                                        <div>
                                            <h3 className="font-semibold text-base text-airbnb-ink">¡Te damos la bienvenida a tu Suite de Negocios!</h3>
                                            <p className="text-xs text-airbnb-muted">Queremos personalizar tus calculos e ideas comerciales. Introduce tu nombre de creadora:</p>
                                        </div>
                                    </div>

                                                    <h3 className="text-lg font-semibold text-airbnb-ink">Catalogo de Estilo de tu Marca ({savedCollections.length})</h3>
                                                    <div className="divide-y divide-airbnb-hairline-soft max-h-56 overflow-y-auto pr-1">
                                                        {savedCollections.map((col) => (
                                                            <div key={col.id} className="py-3.5 flex justify-between className-center gap-2">
                                                                <div>
                                                                    <span className="text-xs font-bold text-airbnb-rausch block">{col.names}</span>
                                                                    <span className="text-[11px] text-airbnb-muted block mt-0.5">{col.vibeName} · Sinergia: {col.scents}</span>
                                                                </div>
                                                                <button 
                                                                    onClick={() => handleDeleteCollection(col.id)}
                                                                    className="text-airbnb-muted hover:text-airbnb-rausch p-1.5 rounded-full transition-colors"
                                                                    title="Eliminar concepto"
                                                                >
                                                                    <Trash2 className="w-4 h-4" />
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* PIE DE PAGINA ESTILO AIRBNB */}
                    <footer className="bg-white border-t border-airbnb-hairline-soft py-12 px-6 mt-12">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between className-center gap-6">
                            <div className="flex className-center gap-2">
                                <Star className="w-4 h-4 text-airbnb-rausch fill-airbnb-rausch" />
                                <span className="text-sm font-semibold text-airbnb-ink">Megapack Crea y Prospera</span>
                            </div>
                            <p className="text-xs text-airbnb-muted text-center md:text-right leading-relaxed">
                                © 2026 Crea y Prospera, Inc. · Herramienta interactiva de soporte premium para alumnos del Megapack en Colombia.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Renderizado definitivo de la App usando la API de React 18
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
